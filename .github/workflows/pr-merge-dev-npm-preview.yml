name: PR Closed Or Merge

on:
  pull_request_target:
    types:
      - closed

jobs:
  remove_assets:
    # 不需要在fork仓库的pr中运行
    if: github.repository == 'Tencent/cherry-markdown' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

         # 获取PR合并后的SHA
      - name: Get merge commit SHA
        run: echo "MERGE_COMMIT_SHA=${{ github.event.pull_request.merge_commit_sha }}" >> $GITHUB_ENV

      # 根据commit id 修改package.json中的版本号
      - name: Get current package version
        id: version
        run: |
          echo "version=$(node -p "require('./lib/package.json').version")-dev.$MERGE_COMMIT_SHA">> "$GITHUB_ENV"

      - name: Change package name
        run: |
          jq '.name="@cherry-markdown/preview-dev"' package.json > temp.json && mv temp.json package.json

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: yarn install
        run: npm i -g yarn && yarn install

      - name: build
        run: yarn build

      - name: npm publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
